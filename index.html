<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <base target="_top">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=Gowun+Dodum&display=swap" rel="stylesheet">

  <style>
    :root {
      --dano-green: #2d6a4f;
      --dano-green-light: #40916c;
      --dano-gold: #d4a017;
      --dano-cream: #fefae0;
      --dano-pink: #e07a5f;
      --dano-blue: #3d5a80;
      --shadow-soft: 0 8px 32px rgba(45, 106, 79, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(165deg, #fefae0 0%, #edf6f0 45%, #d8f3dc 100%);
      min-height: 100vh;
      color: #1b4332;
      padding-bottom: 2rem;
    }

    .app-header {
      background: linear-gradient(135deg, var(--dano-green) 0%, var(--dano-green-light) 100%);
      color: #fff;
      padding: 1.25rem 1rem 1.5rem;
      border-radius: 0 0 1.75rem 1.75rem;
      box-shadow: var(--shadow-soft);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .app-header::before,
    .app-header::after {
      content: '';
      position: absolute;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
    }

    .app-header::before { top: -40px; left: -30px; }
    .app-header::after  { bottom: -50px; right: -20px; }

    .app-title {
      font-family: 'Gowun Dodum', 'Noto Sans KR', sans-serif;
      font-size: 1.65rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      margin: 0;
      position: relative;
      z-index: 1;
    }

    .app-subtitle {
      font-size: 0.85rem;
      opacity: 0.9;
      margin-top: 0.35rem;
      position: relative;
      z-index: 1;
    }

    .main-container {
      max-width: 480px;
      margin: 0 auto;
      padding: 1.25rem 1rem 0;
    }

    .section-card {
      background: rgba(255, 255, 255, 0.92);
      border: none;
      border-radius: 1.25rem;
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(6px);
      overflow: hidden;
    }

    .screen { display: none; animation: fadeUp 0.35s ease; }
    .screen.active { display: block; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── 1단계: 메뉴 선택 ── */
    .menu-card { padding: 1.5rem 1.25rem; }

    .menu-heading {
      font-family: 'Gowun Dodum', sans-serif;
      font-size: 1.1rem;
      text-align: center;
      color: var(--dano-green);
      margin-bottom: 1.25rem;
    }

    .btn-mode {
      width: 100%;
      border: none;
      border-radius: 1.125rem;
      padding: 1.35rem 1.25rem;
      font-size: 1.15rem;
      font-weight: 600;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 0.85rem;
      transition: transform 0.15s, box-shadow 0.15s;
      margin-bottom: 0.85rem;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
    }

    .btn-mode:last-child { margin-bottom: 0; }

    .btn-mode:active { transform: scale(0.98); }

    .btn-mode-earn {
      background: linear-gradient(135deg, #2d6a4f, #52b788);
      color: #fff;
    }

    .btn-mode-earn:hover { color: #fff; box-shadow: 0 8px 24px rgba(45, 106, 79, 0.35); }

    .btn-mode-spend {
      background: linear-gradient(135deg, #e07a5f, #f4a261);
      color: #fff;
    }

    .btn-mode-spend:hover { color: #fff; box-shadow: 0 8px 24px rgba(224, 122, 95, 0.35); }

    .btn-mode-icon {
      font-size: 1.75rem;
      line-height: 1;
      flex-shrink: 0;
    }

    .btn-mode-text small {
      display: block;
      font-size: 0.78rem;
      font-weight: 400;
      opacity: 0.88;
      margin-top: 0.15rem;
    }

    /* ── 2단계: 모드 안내 + 스캐너 ── */
    .mode-banner {
      padding: 1rem 1.25rem;
      border-radius: 1rem;
      font-weight: 600;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1rem;
    }

    .mode-banner.earn {
      background: linear-gradient(135deg, #d8f3dc, #b7e4c7);
      color: #1b4332;
    }

    .mode-banner.spend {
      background: linear-gradient(135deg, #fde2d4, #f4c4b0);
      color: #6d2e1f;
    }

    .booth-pick-wrap {
      margin-bottom: 1rem;
    }

    .booth-pick-label {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--dano-blue);
      margin-bottom: 0.5rem;
    }

    .booth-pill {
      border: 2px solid #e9ecef;
      border-radius: 0.875rem;
      padding: 0.7rem 1rem;
      cursor: pointer;
      background: #fff;
      font-weight: 500;
      font-size: 0.9rem;
      transition: all 0.2s;
      margin-bottom: 0.45rem;
    }

    .booth-pill:last-child { margin-bottom: 0; }

    .booth-pill.selected {
      border-color: var(--dano-pink);
      background: #fff5f2;
      box-shadow: 0 0 0 3px rgba(224, 122, 95, 0.18);
    }

    .scanner-wrap { padding: 1rem; margin-bottom: 1rem; }

    .scanner-label {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--dano-green);
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    #qr-reader {
      width: 100%;
      border-radius: 1rem;
      overflow: hidden;
      border: 2px dashed rgba(45, 106, 79, 0.25);
      background: #f8faf9;
    }

    .scan-hint {
      font-size: 0.8rem;
      color: #6c757d;
      text-align: center;
      margin-top: 0.75rem;
    }

    .btn-back-menu {
      border-radius: 0.875rem;
      font-weight: 500;
      font-size: 0.875rem;
    }

    /* ── 3단계: 학생 카드 + 거래 폼 ── */
    .student-avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--dano-gold), #f4c430);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      color: #fff;
      flex-shrink: 0;
    }

    .balance-badge {
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--dano-green);
    }

    .balance-badge .unit {
      font-size: 0.9rem;
      font-weight: 500;
    }

    .tx-type-badge {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.25em 0.65em;
      border-radius: 2rem;
      margin-bottom: 0.75rem;
    }

    .tx-type-badge.earn  { background: #2d6a4f; color: #fff; }
    .tx-type-badge.spend { background: #e07a5f; color: #fff; }

    .form-label {
      font-weight: 600;
      font-size: 0.875rem;
      color: var(--dano-blue);
    }

    .btn-execute {
      background: linear-gradient(135deg, var(--dano-green), var(--dano-green-light));
      border: none;
      color: #fff;
      font-weight: 600;
      padding: 0.85rem;
      border-radius: 0.875rem;
      font-size: 1.05rem;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .btn-execute:hover:not(:disabled) {
      background: linear-gradient(135deg, #1b4332, var(--dano-green));
      color: #fff;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(45, 106, 79, 0.3);
    }

    .btn-execute:disabled { opacity: 0.55; }

    .btn-rescan {
      border-radius: 0.875rem;
      font-weight: 500;
    }

    .loading-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(27, 67, 50, 0.35);
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }

    .loading-overlay.show { display: flex; }

    .status-bar {
      font-size: 0.78rem;
      color: #6c757d;
      text-align: center;
      margin-top: 1rem;
    }

    .modal-content {
      border: none;
      border-radius: 1.25rem;
      overflow: hidden;
    }

    .modal-icon { font-size: 3rem; margin-bottom: 0.5rem; }
    .modal-icon.success { color: var(--dano-green); }
    .modal-icon.error   { color: var(--dano-pink); }

    .modal-title-text {
      font-family: 'Gowun Dodum', sans-serif;
      font-size: 1.25rem;
    }

    #qr-reader__dashboard_section_csr span,
    #qr-reader__dashboard_section_swaplink {
      font-size: 0.8rem !important;
    }

    #qr-reader img[alt="Info icon"] { display: none; }
  </style>
</head>
<body>

  <header class="app-header">
    <h1 class="app-title">🎋 단오 경제 축제 Pay</h1>
    <p class="app-subtitle" id="headerSubtitle">거래 유형을 선택해 주세요</p>
  </header>

  <div class="main-container">

    <!-- ═══ 1단계: 메뉴 선택 ═══ -->
    <div id="menuScreen" class="screen active">
      <div class="section-card menu-card">
        <p class="menu-heading">오늘 어떤 부스를 운영하시나요?</p>

        <button type="button" class="btn-mode btn-mode-earn" data-mode="earn">
          <span class="btn-mode-icon">💰</span>
          <span class="btn-mode-text">
            단오 적립 (부스1)
            <small>부스1 퀴즈 · 단오머니 적립</small>
          </span>
        </button>

        <button type="button" class="btn-mode btn-mode-spend" data-mode="spend">
          <span class="btn-mode-icon">🛍️</span>
          <span class="btn-mode-text">
            단오 사용 (부스2, 3)
            <small>부스2 창포비누 · 부스3 음식 체험</small>
          </span>
        </button>
      </div>
    </div>

    <!-- ═══ 2~3단계: 스캔 & 거래 ═══ -->
    <div id="sessionScreen" class="screen">

      <!-- 모드 안내 배너 -->
      <div id="modeBanner" class="mode-banner earn">
        <i class="bi bi-info-circle-fill"></i>
        <span id="modeBannerText">-</span>
      </div>

      <!-- 사용 모드: 부스2/3 선택 (스캔 전) -->
      <div id="boothPickWrap" class="booth-pick-wrap section-card p-3" style="display:none;">
        <div class="booth-pick-label">운영 부스를 선택하세요</div>
        <div class="booth-pill" data-desc="부스2 창포비누">🧼 부스2 창포비누</div>
        <div class="booth-pill" data-desc="부스3 음식 체험">🍡 부스3 음식 체험</div>
      </div>

      <!-- QR 스캐너 -->
      <div id="scannerSection" class="section-card scanner-wrap" style="display:none;">
        <div class="scanner-label">
          <i class="bi bi-qr-code-scan"></i> 학생 QR 스캔
        </div>
        <div id="qr-reader"></div>
        <p class="scan-hint">학생 QR 코드(학번_이름)를 카메라에 비춰 주세요</p>
      </div>

      <!-- 학생 정보 카드 -->
      <div id="studentCard" class="section-card" style="display:none;">
        <div class="card-body p-3">
          <div class="d-flex align-items-center gap-3">
            <div class="student-avatar">
              <i class="bi bi-person-fill"></i>
            </div>
            <div class="flex-grow-1">
              <div class="text-muted small">학생 정보</div>
              <div class="fw-bold fs-5" id="studentName">-</div>
              <div class="text-secondary small"><span id="studentGrade">-</span>학년</div>
            </div>
            <div class="text-end">
              <div class="text-muted small">현재 잔액</div>
              <div class="balance-badge">
                <span id="studentBalance">0</span><span class="unit">원</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- 거래 입력 폼 -->
      <div id="txForm" class="section-card mt-3" style="display:none;">
        <div class="card-body p-3">
          <span id="txTypeBadge" class="tx-type-badge earn">적립</span>
          <div class="text-muted small mb-2" id="txBoothLabel">부스1 퀴즈</div>

          <div class="mb-3">
            <label for="amountInput" class="form-label">금액 (원)</label>
            <input type="number" class="form-control form-control-lg" id="amountInput"
                   placeholder="예: 500" min="1" inputmode="numeric">
          </div>

          <div class="mb-3">
            <label for="pinInput" class="form-label">관리자 PIN</label>
            <input type="password" class="form-control" id="pinInput"
                   placeholder="PIN 번호 입력" maxlength="8" inputmode="numeric" autocomplete="off">
          </div>

          <button type="button" class="btn btn-execute w-100 mb-2" id="btnExecute" disabled>
            <i class="bi bi-check-circle"></i> 실행
          </button>
          <button type="button" class="btn btn-outline-secondary btn-rescan w-100" id="btnRescan">
            <i class="bi bi-qr-code-scan"></i> 다른 학생 스캔
          </button>
        </div>
      </div>

      <button type="button" class="btn btn-outline-secondary btn-back-menu w-100 mt-3" id="btnBackMenu">
        <i class="bi bi-house"></i> 처음으로 (메뉴 선택)
      </button>
    </div>

    <p class="status-bar" id="statusBar">거래 유형을 선택해 주세요</p>
  </div>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner-border text-light" style="width: 3rem; height: 3rem;" role="status">
      <span class="visually-hidden">처리 중...</span>
    </div>
  </div>

  <div class="modal fade" id="resultModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-body text-center p-4">
          <div class="modal-icon" id="modalIcon"></div>
          <h5 class="modal-title-text mb-2" id="modalTitle">-</h5>
          <p class="text-muted mb-0" id="modalMessage" style="white-space: pre-line;">-</p>
        </div>
        <div class="modal-footer border-0 justify-content-center pb-4 pt-0">
          <button type="button" class="btn btn-execute px-5" data-bs-dismiss="modal">확인</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    /* ── 모드 설정 ── */
    var MODES = {
      earn: {
        banner: '부스 1 퀴즈 적립 모드입니다.',
        subtitle: '부스1 · 적립 모드',
        type: '적립',
        desc: '부스1 퀴즈',
        bannerClass: 'earn',
        needsBoothPick: false
      },
      spend: {
        banner: '부스 2 · 3 사용 모드입니다. 운영 부스를 선택한 뒤 QR을 스캔하세요.',
        subtitle: '부스2·3 · 사용 모드',
        type: '차감',
        bannerClass: 'spend',
        needsBoothPick: true
      }
    };

    /* ── 상태 ── */
    var state = {
      phase: 'menu',       // menu | scan | pay
      modeKey: null,       // earn | spend
      txConfig: null,      // { type, desc }
      qrId: null,
      student: null,
      isProcessing: false,
      lastScannedId: '',
      lastScanTime: 0,
      scannerRunning: false
    };

    var html5QrCode = null;
    var resultModal = null;

    /* ── 유틸 ── */
    function formatMoney(n) {
      return Number(n || 0).toLocaleString('ko-KR');
    }

    function setStatus(msg) {
      document.getElementById('statusBar').textContent = msg;
    }

    function showLoading(show) {
      document.getElementById('loadingOverlay').classList.toggle('show', show);
    }

    function showModal(isSuccess, title, message, onClose) {
      document.getElementById('modalIcon').className = 'modal-icon ' + (isSuccess ? 'success' : 'error');
      document.getElementById('modalIcon').innerHTML = isSuccess
        ? '<i class="bi bi-check-circle-fill"></i>'
        : '<i class="bi bi-x-circle-fill"></i>';
      document.getElementById('modalTitle').textContent = title;
      document.getElementById('modalMessage').textContent = message;

      var modalEl = document.getElementById('resultModal');
      if (onClose) {
        modalEl.addEventListener('hidden.bs.modal', function handler() {
          modalEl.removeEventListener('hidden.bs.modal', handler);
          onClose();
        });
      }
      resultModal.show();
    }

    function showEl(id, show) {
      document.getElementById(id).style.display = show ? '' : 'none';
    }

    function updateExecuteButton() {
      var amountOk = Number(document.getElementById('amountInput').value) > 0;
      var pinOk = document.getElementById('pinInput').value.length > 0;
      document.getElementById('btnExecute').disabled = !(amountOk && pinOk && state.qrId && state.txConfig);
    }

    /* ── 화면 전환 ── */
    function goToMenu() {
      stopScanner().then(function() {
        state.phase = 'menu';
        state.modeKey = null;
        state.txConfig = null;
        state.qrId = null;
        state.student = null;
        state.lastScannedId = '';
        state.lastScanTime = 0;

        document.getElementById('menuScreen').classList.add('active');
        document.getElementById('sessionScreen').classList.remove('active');

        showEl('scannerSection', false);
        showEl('studentCard', false);
        showEl('txForm', false);
        showEl('boothPickWrap', false);

        document.querySelectorAll('.booth-pill').forEach(function(el) {
          el.classList.remove('selected');
        });

        clearTransactionForm(true);
        document.getElementById('headerSubtitle').textContent = '거래 유형을 선택해 주세요';
        setStatus('거래 유형을 선택해 주세요');
      });
    }

    function enterMode(modeKey) {
      var mode = MODES[modeKey];
      state.phase = 'scan';
      state.modeKey = modeKey;
      state.qrId = null;
      state.student = null;
      state.lastScannedId = '';
      state.lastScanTime = 0;

      if (modeKey === 'earn') {
        state.txConfig = { type: mode.type, desc: mode.desc };
      } else {
        state.txConfig = null;
      }

      document.getElementById('menuScreen').classList.remove('active');
      document.getElementById('sessionScreen').classList.add('active');

      var banner = document.getElementById('modeBanner');
      banner.className = 'mode-banner ' + mode.bannerClass;
      document.getElementById('modeBannerText').textContent = mode.banner;
      document.getElementById('headerSubtitle').textContent = mode.subtitle;

      showEl('studentCard', false);
      showEl('txForm', false);
      clearTransactionForm(true);

      if (mode.needsBoothPick) {
        showEl('boothPickWrap', true);
        showEl('scannerSection', false);
        document.querySelectorAll('.booth-pill').forEach(function(el) {
          el.classList.remove('selected');
        });
        setStatus('운영 부스를 선택해 주세요');
      } else {
        showEl('boothPickWrap', false);
        revealScanner();
      }
    }

    function selectSpendBooth(desc) {
      state.txConfig = { type: '차감', desc: desc };
      revealScanner();
    }

    function revealScanner() {
      showEl('scannerSection', true);
      showEl('studentCard', false);
      showEl('txForm', false);
      state.qrId = null;
      clearTransactionForm(true);
      startScanner();
    }

    function enterPayPhase(info) {
      state.phase = 'pay';
      stopScanner();

      showEl('scannerSection', false);
      showEl('studentCard', true);
      showEl('txForm', true);

      document.getElementById('studentName').textContent = info.name;
      document.getElementById('studentGrade').textContent = info.grade;
      document.getElementById('studentBalance').textContent = formatMoney(info.balance);

      var isEarn = state.txConfig.type === '적립';
      var badge = document.getElementById('txTypeBadge');
      badge.textContent = isEarn ? '💰 적립' : '🛍️ 차감';
      badge.className = 'tx-type-badge ' + (isEarn ? 'earn' : 'spend');
      document.getElementById('txBoothLabel').textContent = state.txConfig.desc;

      document.getElementById('amountInput').value = '';
      document.getElementById('pinInput').value = '';
      updateExecuteButton();

      setStatus(info.name + ' 학생 — 금액과 PIN을 입력하세요');
    }

    /* ── QR 스캐너 ── */
    function startScanner() {
      if (state.scannerRunning) return;
      if (!state.txConfig) return;

      if (!html5QrCode) {
        html5QrCode = new Html5Qrcode('qr-reader');
      }

      var config = {
        fps: 10,
        qrbox: function(w, h) {
          var size = Math.min(w, h) * 0.72;
          return { width: size, height: size };
        },
        aspectRatio: 1.0
      };

      html5QrCode.start(
        { facingMode: 'environment' },
        config,
        onScanSuccess,
        function() {}
      ).then(function() {
        state.scannerRunning = true;
        setStatus('QR 코드를 스캔해 주세요');
      }).catch(function(err) {
        setStatus('카메라를 사용할 수 없습니다. 권한을 확인해 주세요.');
        console.error('Scanner error:', err);
      });
    }

    function stopScanner() {
      if (!html5QrCode || !state.scannerRunning) return Promise.resolve();
      return html5QrCode.stop().then(function() {
        state.scannerRunning = false;
      }).catch(function() {
        state.scannerRunning = false;
      });
    }

    function onScanSuccess(decodedText) {
      var qrId = decodedText.trim();
      if (!qrId || state.isProcessing || state.phase !== 'scan') return;

      var now = Date.now();
      if (qrId === state.lastScannedId && now - state.lastScanTime < 1500) return;

      state.lastScannedId = qrId;
      state.lastScanTime = now;
      fetchStudentInfo(qrId);
    }

    /* ── 학생 조회 ── */
    function fetchStudentInfo(qrId) {
      state.isProcessing = true;
      showLoading(true);
      setStatus('학생 정보 조회 중...');

      google.script.run
        .withSuccessHandler(function(res) {
          showLoading(false);
          state.isProcessing = false;

          if (!res || !res.success) {
            showModal(false, '조회 실패', (res && res.error) || '학생 정보를 불러올 수 없습니다.');
            setStatus('QR 코드를 다시 스캔해 주세요');
            return;
          }

          state.qrId = res.qrId;
          state.student = res;
          enterPayPhase(res);
        })
        .withFailureHandler(function(err) {
          showLoading(false);
          state.isProcessing = false;
          showModal(false, '통신 오류', err.message || '서버와 통신할 수 없습니다.');
          setStatus('QR 코드를 다시 스캔해 주세요');
        })
        .getStudentInfo(qrId);
    }

    /* ── 거래 처리 ── */
    function executeTransaction() {
      if (!state.qrId || !state.txConfig) return;

      var amount = Number(document.getElementById('amountInput').value);
      var pin = document.getElementById('pinInput').value;

      if (!amount || amount <= 0) {
        showModal(false, '입력 오류', '금액을 올바르게 입력해 주세요.');
        return;
      }
      if (!pin) {
        showModal(false, '입력 오류', '관리자 PIN을 입력해 주세요.');
        return;
      }

      state.isProcessing = true;
      document.getElementById('btnExecute').disabled = true;
      showLoading(true);
      setStatus('거래 처리 중...');

      google.script.run
        .withSuccessHandler(function(res) {
          showLoading(false);
          state.isProcessing = false;

          if (!res || !res.success) {
            showModal(false, '거래 실패', (res && res.error) || '거래를 처리할 수 없습니다.');
            updateExecuteButton();
            return;
          }

          var msg = res.message + '\n새 잔액: ' + formatMoney(res.balance) + '원';
          showModal(true, '거래 완료', msg, function() {
            goToMenu();
          });
        })
        .withFailureHandler(function(err) {
          showLoading(false);
          state.isProcessing = false;
          showModal(false, '통신 오류', err.message || '서버와 통신할 수 없습니다.');
          updateExecuteButton();
        })
        .processTransaction(
          state.qrId,
          state.txConfig.type,
          amount,
          state.txConfig.desc,
          pin
        );
    }

    function clearTransactionForm(clearPin) {
      document.getElementById('amountInput').value = '';
      if (clearPin !== false) {
        document.getElementById('pinInput').value = '';
      }
      updateExecuteButton();
    }

    function rescanStudent() {
      state.qrId = null;
      state.student = null;
      state.lastScannedId = '';
      state.lastScanTime = 0;
      state.phase = 'scan';

      showEl('studentCard', false);
      showEl('txForm', false);
      clearTransactionForm(true);
      revealScanner();
    }

    /* ── 이벤트 ── */
    document.addEventListener('DOMContentLoaded', function() {
      resultModal = new bootstrap.Modal(document.getElementById('resultModal'));

      document.querySelectorAll('.btn-mode').forEach(function(btn) {
        btn.addEventListener('click', function() {
          enterMode(btn.dataset.mode);
        });
      });

      document.querySelectorAll('.booth-pill').forEach(function(pill) {
        pill.addEventListener('click', function() {
          document.querySelectorAll('.booth-pill').forEach(function(p) {
            p.classList.remove('selected');
          });
          pill.classList.add('selected');
          selectSpendBooth(pill.dataset.desc);
        });
      });

      document.getElementById('amountInput').addEventListener('input', updateExecuteButton);
      document.getElementById('pinInput').addEventListener('input', updateExecuteButton);
      document.getElementById('btnExecute').addEventListener('click', executeTransaction);
      document.getElementById('btnRescan').addEventListener('click', rescanStudent);
      document.getElementById('btnBackMenu').addEventListener('click', goToMenu);
    });
  </script>
</body>
</html>
